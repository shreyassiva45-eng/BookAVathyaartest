{% extends 'base.html' %}
{% block content %}
<div class="auth-page">
    <div class="auth-overlay"></div>
    <div class="auth-container fade-in">
        <div class="card glass">
            <div style="text-align: center; margin-bottom: 2rem;">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Book a Vaathyaar" style="height: 80px; border-radius: 20px; margin-bottom: 1rem; box-shadow: var(--card-shadow);">
                <h2 id="form-title" style="font-size: 2rem; background: linear-gradient(45deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Join Book a Vaathyaar</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem;">Experience spiritual harmony with ease</p>
            </div>
            
            <div id="role-selection" style="text-align: center;">
                <h3 style="margin-bottom: 1.5rem; font-weight: 500;">How would you like to proceed?</h3>
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <button class="btn btn-primary" onclick="selectRole('normal')">I want to book a Ritual</button>
                    <button class="btn btn-outline" onclick="selectRole('priest')">I am a Priest (Purohit)</button>
                </div>
                
                <div style="margin-top: 2.5rem; border-top: 1px solid var(--glass-border); padding-top: 2rem;">
                    <p style="margin-bottom: 1rem; color: var(--text-muted); font-size: 0.9rem;">Already have an account?</p>
                    <button class="btn btn-ghost" style="width: 100%;" onclick="showLogin()">Login to your account</button>
                </div>
            </div>

            <form id="auth-form" method="POST" action="{{ url_for('auth_portal') }}" style="display: none;">
                <input type="hidden" name="action" id="form-action" value="signup">
                <input type="hidden" name="role" id="form-role" value="">
                <input type="hidden" name="lat" id="lat-input">
                <input type="hidden" name="lng" id="lng-input">
                
                <div id="social-auth" style="display: none; margin-bottom: 2rem;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <button type="button" class="btn btn-ghost" onclick="mockSocialLogin('Google')" style="padding: 0.75rem;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                            Google
                        </button>
                        <button type="button" class="btn btn-ghost" onclick="mockSocialLogin('Apple')" style="padding: 0.75rem;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.78 1.18-.19 2.29-.88 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.84 2.09-2.02 3.65-2.53 4.1zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.35 2.45-2.14 4.54-3.74 4.25z"/></svg>
                            Apple
                        </button>
                    </div>
                    <div style="text-align: center; color: var(--text-muted); margin: 1.5rem 0; font-size: 0.8rem; letter-spacing: 1px;">OR USE EMAIL</div>
                </div>

                <div id="signup-fields">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" name="name" class="form-control" placeholder="John Doe">
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div id="normal-brahmin-check" style="display: none; margin-bottom: 2rem; text-align: center;">
                    <label style="display: block; margin-bottom: 1rem; color: var(--text-muted); font-size: 0.95rem;">Are you a Hindu Brahmin?</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <button type="button" class="btn btn-outline" id="brahmin-yes" onclick="setBrahminStatus(true)">Yes</button>
                        <button type="button" class="btn btn-outline" id="brahmin-no" onclick="setBrahminStatus(false)">No</button>
                    </div>
                    <input type="hidden" name="is_brahmin" id="is-brahmin-input" value="">
                </div>

                <div id="extended-fields" style="display: none;">
                    <div id="brahmin-yes-fields" style="display: none;">
                        <div class="form-group">
                            <label>Gotra</label>
                            <input type="text" name="gotra_brahmin" class="form-control" placeholder="e.g. Kashyapa">
                        </div>
                        <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label>Sutra</label>
                                <input type="text" name="sutra" class="form-control" placeholder="e.g. Bodhayana">
                            </div>
                            <div class="form-group">
                                <label>Veda</label>
                                <select name="veda" class="form-control">
                                    <option value="">Select...</option>
                                    <option value="Rig Veda">Rig Veda</option>
                                    <option value="Yajur Veda">Yajur Veda</option>
                                    <option value="Sama Veda">Sama Veda</option>
                                    <option value="Atharva Veda">Atharva Veda</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div id="brahmin-no-fields" style="display: none;">
                        <div class="form-group">
                            <label>Family Gotra (if known)</label>
                            <input type="text" name="gotra_non_brahmin" class="form-control" placeholder="Type your Gotra here">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Gender</label>
                        <select name="gender" class="form-control">
                            <option value="">Select Gender...</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>

                    <div id="priest-fields" style="display: none;">
                        <label style="margin-bottom: 1rem; display: block; font-weight: 600;">Rituals you perform</label>
                        <div class="glass" style="padding: 1rem; margin-bottom: 1rem;">
                            <table style="width: 100%; border-collapse: collapse;" id="functions-table">
                                <thead>
                                    <tr style="text-align: left; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">
                                        <th style="padding: 0.5rem;">Ritual</th>
                                        <th style="padding: 0.5rem;">Days</th>
                                        <th style="padding: 0.5rem;">Fee (₹)</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody id="functions-body">
                                    <tr>
                                        <td><input type="text" class="form-control func-name" placeholder="Pooja" style="padding: 0.5rem; font-size: 0.85rem;"></td>
                                        <td><input type="number" class="form-control func-days" placeholder="1" style="padding: 0.5rem; font-size: 0.85rem;"></td>
                                        <td><input type="number" class="form-control func-amount" placeholder="2000" style="padding: 0.5rem; font-size: 0.85rem;"></td>
                                        <td><button type="button" class="close-modal" style="padding: 0.5rem;" onclick="removeRow(this)">×</button></td>
                                    </tr>
                                </tbody>
                            </table>
                            <button type="button" class="btn btn-ghost" style="width: 100%; margin-top: 1rem; font-size: 0.8rem;" onclick="addRow()">+ Add More</button>
                        </div>
                        <input type="hidden" name="functions" id="functions-json">
                    </div>

                    <div id="priest-location-group" style="display: none; margin-bottom: 1.5rem;">
                        <button type="button" class="btn btn-outline" style="width: 100%;" onclick="getCurrentLocation()">
                            <span id="location-btn-text">📍 Share My Business Location</span>
                        </button>
                        <div id="location-status" style="text-align: center; color: var(--success); font-size: 0.8rem; margin-top: 0.5rem; display: none;">✓ Location Verified</div>
                    </div>
                </div>

                <div style="display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" id="submit-btn" style="width: 100%;">Create Account</button>
                    <button type="button" class="btn btn-ghost" style="width: 100%;" onclick="resetForm()">Go Back</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function selectRole(role) {
        document.getElementById('role-selection').style.display = 'none';
        document.getElementById('auth-form').style.display = 'block';
        document.getElementById('form-action').value = 'signup';
        document.getElementById('form-role').value = role;
        document.getElementById('form-title').innerText = role === 'priest' ? 'Priest Sign Up' : 'Sign Up to Book';
        
        document.getElementById('signup-fields').style.display = 'block';
        
        if (role === 'normal') {
            document.getElementById('social-auth').style.display = 'block';
            document.getElementById('priest-fields').style.display = 'none';
            document.getElementById('priest-location-group').style.display = 'none';
            document.getElementById('normal-brahmin-check').style.display = 'block';
            document.getElementById('extended-fields').style.display = 'none'; // Wait for brahmin check
            document.getElementById('submit-btn').disabled = true;
        } else {
            document.getElementById('social-auth').style.display = 'none';
            document.getElementById('priest-fields').style.display = 'block';
            document.getElementById('priest-location-group').style.display = 'block';
            document.getElementById('normal-brahmin-check').style.display = 'none';
            document.getElementById('extended-fields').style.display = 'block';
            document.getElementById('brahmin-yes-fields').style.display = 'none';
            document.getElementById('brahmin-no-fields').style.display = 'none';
            document.getElementById('submit-btn').disabled = false;
        }
        document.getElementById('submit-btn').innerText = 'Sign Up';
    }

    function setBrahminStatus(isBrahmin) {
        document.getElementById('is-brahmin-input').value = isBrahmin;
        document.getElementById('extended-fields').style.display = 'block';
        document.getElementById('submit-btn').disabled = false;

        const yesBtn = document.getElementById('brahmin-yes');
        const noBtn = document.getElementById('brahmin-no');

        if(isBrahmin) {
            yesBtn.classList.add('btn-primary');
            yesBtn.classList.remove('btn-outline');
            noBtn.classList.add('btn-outline');
            noBtn.classList.remove('btn-primary');
            document.getElementById('brahmin-yes-fields').style.display = 'block';
            document.getElementById('brahmin-no-fields').style.display = 'none';
        } else {
            noBtn.classList.add('btn-primary');
            noBtn.classList.remove('btn-outline');
            yesBtn.classList.add('btn-outline');
            yesBtn.classList.remove('btn-primary');
            document.getElementById('brahmin-no-fields').style.display = 'block';
            document.getElementById('brahmin-yes-fields').style.display = 'none';
        }
    }

    function showLogin() {
        document.getElementById('role-selection').style.display = 'none';
        document.getElementById('auth-form').style.display = 'block';
        document.getElementById('form-action').value = 'login';
        document.getElementById('form-title').innerText = 'Welcome Back';
        
        document.getElementById('social-auth').style.display = 'block';
        document.getElementById('signup-fields').style.display = 'none';
        document.getElementById('normal-brahmin-check').style.display = 'none';
        document.getElementById('extended-fields').style.display = 'none';
        document.getElementById('submit-btn').innerText = 'Login';
        document.getElementById('submit-btn').disabled = false;
    }

    function resetForm() {
        document.getElementById('auth-form').style.display = 'none';
        document.getElementById('role-selection').style.display = 'block';
        document.getElementById('form-title').innerText = 'Join Book A Vaathyaar';
        
        // Reset Brahmin buttons
        document.getElementById('brahmin-yes').classList.add('btn-outline');
        document.getElementById('brahmin-yes').classList.remove('btn-primary');
        document.getElementById('brahmin-no').classList.add('btn-outline');
        document.getElementById('brahmin-no').classList.remove('btn-primary');
    }

    function addRow() {
        const body = document.getElementById('functions-body');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" class="form-control func-name" style="padding: 0.5rem;"></td>
            <td><input type="number" class="form-control func-days" style="padding: 0.5rem;"></td>
            <td><input type="number" class="form-control func-amount" style="padding: 0.5rem;"></td>
            <td><button type="button" class="btn btn-danger" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;" onclick="removeRow(this)">×</button></td>
        `;
        body.appendChild(tr);
    }

    function removeRow(btn) {
        btn.closest('tr').remove();
    }

    // Capture form submission to serialize table
    document.getElementById('auth-form').onsubmit = function(e) {
        if (document.getElementById('form-role').value === 'priest' && document.getElementById('form-action').value === 'signup') {
            const rows = document.querySelectorAll('#functions-body tr');
            const data = [];
            rows.forEach(row => {
                const name = row.querySelector('.func-name').value;
                const days = row.querySelector('.func-days').value;
                const amount = row.querySelector('.func-amount').value;
                if (name) data.push({ name, days, amount });
            });
            document.getElementById('functions-json').value = JSON.stringify(data);
        }
    };

    function mockSocialLogin(provider) {
        alert('Mocking ' + provider + ' Sign In. In production, this will redirect to their OAuth portal.');
        // For demonstration, fill form arbitrarily
        document.querySelector('input[name="name"]').value = 'Mock User';
        document.querySelector('input[name="email"]').value = 'mockuser@' + provider.toLowerCase() + '.com';
        document.querySelector('input[name="password"]').value = 'mockpassword123';
    }

    function getCurrentLocation() {
        const btnText = document.getElementById('location-btn-text');
        const status = document.getElementById('location-status');
        const latInput = document.getElementById('lat-input');
        const lngInput = document.getElementById('lng-input');

        btnText.innerText = "Locating...";
        
        if (!navigator.geolocation) {
            alert("Geolocation is not supported by your browser");
            btnText.innerText = "📍 Set My Current Location";
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (position) => {
                latInput.value = position.coords.latitude;
                lngInput.value = position.coords.longitude;
                btnText.innerText = "Location Captured";
                status.style.display = 'block';
            },
            (error) => {
                console.error("Error getting location:", error);
                alert("Unable to retrieve your location. Please ensure location services are enabled.");
                btnText.innerText = "📍 Set My Current Location";
            }
        );
    }
</script>
{% endblock %}
